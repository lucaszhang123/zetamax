<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Zetamax{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="ss-nav">
    <a class="ss-nav-brand" href="{{ url_for('index') if session.get('user_id') else url_for('login') }}">zetamax</a>
    {% if session.get('user_id') %}
      <div class="ss-nav-right">
        <span class="ss-nav-user">{{ session.get('username') }}</span>
        <a class="ss-nav-link" href="{{ url_for('logout') }}">Log out</a>
      </div>
    {% endif %}
  </nav>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="ss-flash-wrap">
        {% for m in messages %}
          <div class="ss-flash">{{ m }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="ss-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
