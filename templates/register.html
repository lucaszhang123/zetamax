{% extends "base.html" %}
{% block title %}Create account — Zetamax{% endblock %}
{% block content %}
<div class="ss-auth-wrap">
  <div class="ss-auth-card">
    <div class="ss-eyebrow">zetamax</div>
    <h1 class="ss-h1">Create an account</h1>
    <p class="ss-sub">Your runs, stats, and weak-spot data are saved to this account only.</p>
    <form method="POST" action="{{ url_for('register') }}" class="ss-auth-form">
      <div class="ss-field">
        <label for="username">Username</label>
        <input class="ss-input" type="text" id="username" name="username" autocomplete="username" required autofocus minlength="3" />
      </div>
      <div class="ss-field">
        <label for="password">Password</label>
        <input class="ss-input" type="password" id="password" name="password" autocomplete="new-password" required minlength="6" />
      </div>
      <div class="ss-field">
        <label for="confirm">Confirm password</label>
        <input class="ss-input" type="password" id="confirm" name="confirm" autocomplete="new-password" required minlength="6" />
      </div>
      <button class="ss-btn ss-btn-primary ss-btn-block" type="submit">Create account</button>
    </form>
    <p class="ss-auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
